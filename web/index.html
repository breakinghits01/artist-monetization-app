<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- interactive-widget=resizes-content: tells the browser that the
       on-screen keyboard should resize the layout viewport (not just the
       visual viewport). This prevents the CanvasKit canvas from receiving
       a surprise resize event when the keyboard dismisses, eliminating the
       half-white-screen repaint gap on mobile Chrome/Safari. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="dynamic_artist_monetization">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>dynamic_artist_monetization</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /*
     * Viewport stability fix for Flutter Web on mobile Chrome/Safari.
     *
     * Problem: When the browser's address bar slides in/out (triggered by
     * scrolling), the browser reports a viewport resize. CanvasKit treats
     * this as a layout change and repaints the entire canvas, producing a
     * visible white blink.
     *
     * Fix: Flutter manages all in-app scrolling internally via its own
     * scroll physics engine. Suppressing body overflow is safe — it just
     * prevents the browser's native scroll from interfering. The dynamic
     * viewport unit (100dvh) locks the body to the real visible height,
     * ignoring transient browser-chrome size changes.
     *
     * Impact: Desktop layout unaffected (no overflow to suppress).
     *         All Flutter widget scrolling, animations unchanged.
     */
    html,
    body {
      /* overflow:hidden prevents the browser's native scroll from
         interfering with Flutter's internal scroll engine. Safe because
         Flutter handles all scrolling itself via its own physics. */
      overflow: hidden;
      /* Use 100% (layout viewport) NOT 100dvh (dynamic visual viewport).
         dvh changes when the keyboard opens/closes, triggering a CanvasKit
         canvas resize and a visible repaint gap (half-white screen).
         100% stays anchored to the stable layout viewport height which is
         already controlled by interactive-widget=resizes-content above. */
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
    }
  </style>

  <script>
    // Configure Flutter web renderer and suppress warnings
    window.flutterConfiguration = {
      canvasKitBaseUrl: "https://www.gstatic.com/flutter-canvaskit/a9c9c50610c2bb9b7c2f0928c01a6b84e1961c0e/",
      canvasKitForceCpuOnly: false
    };
    
    // Suppress known console warnings
    const originalConsoleWarn = console.warn;
    console.warn = function(...args) {
      const message = args.join(' ');
      // Suppress Noto font warnings
      if (message.includes('Noto') || message.includes('missing characters')) {
        return;
      }
      // Suppress v8BreakIterator deprecation warning (Flutter framework issue)
      if (message.includes('v8BreakIterator') || message.includes('Intl.Segmenter')) {
        return;
      }
      originalConsoleWarn.apply(console, args);
    };
    
    // Suppress CSP eval warnings (expected in Flutter web)
    const originalConsoleError = console.error;
    console.error = function(...args) {
      const message = args.join(' ');
      if (message.includes('Content Security Policy') && message.includes('eval')) {
        return;
      }
      originalConsoleError.apply(console, args);
    };
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
